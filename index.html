<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小权商城</title>
<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:#fff;
}
.header{
background:#111827;
padding:20px;
text-align:center;
font-size:32px;
font-weight:bold;
color:#00e5ff;
}
.banner{
padding:80px 20px;
text-align:center;
background:linear-gradient(135deg,#00e5ff,#7c3aed);
}
.banner h1{
font-size:48px;
margin:0;
}
.banner p{
font-size:20px;
}
.btn{
display:inline-block;
padding:15px 30px;
background:#fff;
color:#111;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}
.card{
background:#1e293b;
padding:20px;
border-radius:15px;
}
.price{
color:#00ff88;
font-size:24px;
margin:10px 0;
}
.buy{
display:block;
background:#00e5ff;
color:#000;
text-align:center;
padding:10px;
border-radius:10px;
text-decoration:none;
}
.footer{
background:#111827;
text-align:center;
padding:20px;
}
</style>
</head>

<body>

<div class="header">
小权商城
</div>

<div class="banner">
<h1>全球热门应用服务中心</h1>
<p>TikTok · Telegram · YouTube · Instagram</p >
<a href=" " class="btn">立即咨询</a >
</div>

<div class="products">

<div class="card">
<h2>TikTok教程</h2>
<div class="price">¥29.9</div>
<a href="#" class="buy">立即购买</a >
</div>

<div class="card">
<h2>Telegram教程</h2>
<div class="price">¥19.9</div>
<a href="#" class="buy">立即购买</a >
</div>

<div class="card">
<h2>海外APP合集</h2>
<div class="price">¥49.9</div>
<a href="#" class="buy">立即购买</a >
</div>

</div>

<div class="footer">
© 2026 小权商城
</div>

</body>
</html>
